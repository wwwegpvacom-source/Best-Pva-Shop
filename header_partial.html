    <header class="bg-[#0B1120]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 cursor-pointer text-decoration-none">
                    <img src="{{LOGO_URL}}" alt="{{LOGO_TEXT}}" class="w-8 h-8 object-contain">
                    <span class="logo-text text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 font-extrabold text-2xl tracking-tight">{{LOGO_TEXT}}</span>
                    <span class="logo-badge ml-1 text-red-500 text-lg animate-pulse drop-shadow-lg">{{LOGO_BADGE}}</span>
                </a>

                <nav class="desktop-nav-container items-center gap-1" id="desktop-nav">
                </nav>

                <div class="flex items-center gap-2">
                    <button class="p-3 text-slate-400 hover:text-cyan-400 transition-colors" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="mobile-menu-btn-container p-3 text-slate-400 hover:text-white" aria-label="Menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="menu-open-icon" class="w-6 h-6"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="menu-close-icon" class="w-6 h-6 hidden"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

        </div>
    </header>

    <!-- Mobile Menu Backdrop -->
    <div id="mobile-menu-backdrop" onclick="closeMobileMenu()" class="fixed inset-0 bg-black/80 z-[150] backdrop-blur-sm transition-opacity duration-300" style="display:none;opacity:0;pointer-events:none;"></div>

    <!-- Mobile Menu Sidebar -->
    <div id="mobile-menu" class="fixed top-0 right-0 bottom-0 w-[80%] max-w-[300px] bg-[#0B1120] border-l border-white/10 flex-col shadow-2xl z-[200]" style="display:none;" aria-hidden="true">
        <div class="h-16 flex items-center justify-between px-6 border-b border-white/5">
            <span class="text-white font-bold">Menu</span>
            <button onclick="closeMobileMenu()" class="p-2 text-slate-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-hide" id="mobile-nav-items">
        </div>
        <div class="p-4 border-t border-white/10 bg-[#0B1120]/50 backdrop-blur-xl">
             <button onclick="openPopup()" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-cyan-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> {{POPUP_TITLE}}
            </button>
        </div>
    </div>
    <script>
        function toggleMobileMenu() {
            var menu = document.getElementById('mobile-menu');
            var backdrop = document.getElementById('mobile-menu-backdrop');
            var openIcon = document.getElementById('menu-open-icon');
            var closeIcon = document.getElementById('menu-close-icon');
            if (!menu) return;
            var isOpen = menu.style.display === 'flex';
            if (isOpen) { closeMobileMenu(); return; }
            menu.style.display = 'flex';
            menu.setAttribute('aria-hidden', 'false');
            if (backdrop) { backdrop.style.display = 'block'; backdrop.style.opacity = '1'; backdrop.style.pointerEvents = 'auto'; }
            if (openIcon) openIcon.style.display = 'none';
            if (closeIcon) closeIcon.style.display = 'inline-block';
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            var menu = document.getElementById('mobile-menu');
            var backdrop = document.getElementById('mobile-menu-backdrop');
            var openIcon = document.getElementById('menu-open-icon');
            var closeIcon = document.getElementById('menu-close-icon');
            if (menu) { menu.style.display = 'none'; menu.setAttribute('aria-hidden', 'true'); }
            if (backdrop) { backdrop.style.display = 'none'; backdrop.style.opacity = '0'; backdrop.style.pointerEvents = 'none'; }
            if (openIcon) openIcon.style.display = 'inline-block';
            if (closeIcon) closeIcon.style.display = 'none';
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            var toggles = document.querySelectorAll('.mobile-cat-toggle');
            for (var i = 0; i < toggles.length; i++) {
                (function(toggle) {
                    toggle.addEventListener('click', function() {
                        var cat = toggle.getAttribute('data-cat');
                        var items = document.getElementById('mobile-items-' + cat);
                        var icon = toggle.querySelector('svg');
                        if (items) {
                            if (items.style.display === 'block') {
                                items.style.display = 'none';
                                if (icon) icon.style.transform = 'rotate(0deg)';
                            } else {
                                items.style.display = 'block';
                                if (icon) icon.style.transform = 'rotate(180deg)';
                            }
                        }
                    });
                })(toggles[i]);
            }
        });
    </script>
